version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: archai_postgres
    environment:
      POSTGRES_DB: archai
      POSTGRES_USER: archai_user
      POSTGRES_PASSWORD: archai_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - archai_network

  redis:
    image: redis:7-alpine
    container_name: archai_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - archai_network

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: archai_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@archai.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - archai_network

volumes:
  postgres_data:
  redis_data:

networks:
  archai_network:
    driver: bridge