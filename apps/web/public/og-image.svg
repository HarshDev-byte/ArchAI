<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0f14"/>
  
  <!-- Gradient background -->
  <defs>
    <radialGradient id="bg-gradient" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#7F77DD" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#7F77DD" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg-gradient)"/>
  
  <!-- Logo -->
  <rect x="100" y="100" width="48" height="48" rx="12" fill="#7F77DD"/>
  <path d="M112 120l12-8 12 8v16a2 2 0 01-2 2h-20a2 2 0 01-2-2v-16z" fill="white"/>
  <path d="M118 138v-10h8v10" fill="#7F77DD"/>
  
  <!-- Title -->
  <text x="170" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white">DesignAI</text>
  
  <!-- Main headline -->
  <text x="100" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="white">Design your building</text>
  <text x="100" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="64" font-weight="900" fill="#7F77DD">in minutes, not months</text>
  
  <!-- Subtitle -->
  <text x="100" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="#a0a9c0">AI-powered feasibility + 3 layout options + PDF export</text>
  
  <!-- Features -->
  <g transform="translate(100, 480)">
    <!-- Feature 1 -->
    <rect width="32" height="32" rx="8" fill="#7F77DD" fill-opacity="0.2"/>
    <path d="M8 16l8-6 8 6v10a1 1 0 01-1 1H9a1 1 0 01-1-1v-10z" fill="#7F77DD" transform="translate(8, 8)"/>
    <text x="45" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white">Draw Plot</text>
    
    <!-- Feature 2 -->
    <g transform="translate(200, 0)">
      <rect width="32" height="32" rx="8" fill="#60a5fa" fill-opacity="0.2"/>
      <path d="M8 8l8 8-8 8M16 16h8" stroke="#60a5fa" stroke-width="2" fill="none" transform="translate(8, 8)"/>
      <text x="45" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white">AI Analysis</text>
    </g>
    
    <!-- Feature 3 -->
    <g transform="translate(400, 0)">
      <rect width="32" height="32" rx="8" fill="#34d399" fill-opacity="0.2"/>
      <rect x="8" y="12" width="16" height="12" rx="2" fill="none" stroke="#34d399" stroke-width="2" transform="translate(8, 8)"/>
      <text x="45" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" fill="white">3D Export</text>
    </g>
  </g>
</svg>